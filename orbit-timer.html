<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbit Timer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060611;
    --text: #e8ecff;
    --muted: #6b7190;
    --accent: #6ee7ff;
    --accent-dim: rgba(110, 231, 255, 0.15);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    height: 100%;
    overflow: hidden;
  }
  #stars, #stars2, #stars3 {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
  }
  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 1; }
  }
  @media (prefers-reduced-motion: reduce) {
    .star { animation: none; opacity: 0.6; }
  }

  main {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }

  .label {
    font-size: 13px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 18px;
    min-height: 18px;
  }

  .clock {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(64px, 18vw, 150px);
    letter-spacing: 0.04em;
    line-height: 1;
    color: var(--text);
    text-shadow: 0 0 18px var(--accent-dim), 0 0 40px rgba(110,231,255,0.08);
  }

  .sub {
    margin-top: 10px;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 0.1em;
  }

  .presets {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-top: 36px;
  }
  .preset-btn {
    background: transparent;
    border: 1px solid rgba(232,236,255,0.18);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 10px 18px;
    border-radius: 100px;
    cursor: pointer;
    transition: border-color 0.2s ease, background 0.2s ease;
  }
  .preset-btn:hover { border-color: var(--accent); }
  .preset-btn.active {
    border-color: var(--accent);
    background: var(--accent-dim);
    color: var(--accent);
  }

  .controls {
    display: flex;
    gap: 12px;
    margin-top: 28px;
  }
  .ctrl-btn {
    background: var(--text);
    color: #07070f;
    border: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 12px 26px;
    border-radius: 100px;
    cursor: pointer;
    transition: transform 0.15s ease, opacity 0.15s ease;
  }
  .ctrl-btn:hover { transform: translateY(-1px); }
  .ctrl-btn.secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid rgba(232,236,255,0.18);
  }
  .ctrl-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  .custom-row {
    margin-top: 18px;
    display: flex;
    gap: 8px;
    align-items: center;
    color: var(--muted);
    font-size: 12px;
  }
  .custom-row input {
    width: 56px;
    background: transparent;
    border: 1px solid rgba(232,236,255,0.18);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 8px 10px;
    border-radius: 8px;
    text-align: center;
  }
  .custom-row input:focus { outline: none; border-color: var(--accent); }
  .custom-row button {
    background: transparent;
    border: 1px solid rgba(232,236,255,0.18);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
  }

  .done-flash {
    animation: flash 1s ease-in-out infinite;
  }
  @keyframes flash {
    0%, 100% { color: var(--text); text-shadow: 0 0 18px var(--accent-dim); }
    50% { color: #ff7a7a; text-shadow: 0 0 40px rgba(255,122,122,0.5); }
  }
</style>
</head>
<body>

<div id="stars"></div>
<div id="stars2"></div>

<main>
  <div class="label" id="label">SELECT A MODE</div>
  <div class="clock" id="clock">00:00</div>
  <div class="sub" id="sub">ready</div>

  <div class="presets">
    <button class="preset-btn" data-mins="60" data-label="Lunch">Lunch · 60m</button>
    <button class="preset-btn" data-mins="15" data-label="Break">Break · 15m</button>
    <button class="preset-btn" data-mins="30" data-label="Long Break">Long Break · 30m</button>
    <button class="preset-btn" data-mins="5" data-label="Quick Break">Quick · 5m</button>
  </div>

  <div class="custom-row">
    <span>custom:</span>
    <input type="number" id="customMins" placeholder="min" min="1">
    <button id="customSet">Set</button>
  </div>

  <div class="controls">
    <button class="ctrl-btn" id="startBtn" disabled>Start</button>
    <button class="ctrl-btn secondary" id="pauseBtn" disabled>Pause</button>
    <button class="ctrl-btn secondary" id="resetBtn" disabled>Reset</button>
  </div>
</main>

<script>
  // ===== Starfield =====
  function makeStars(containerId, count, sizeRange, durRange) {
    const container = document.getElementById(containerId);
    for (let i = 0; i < count; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      const size = Math.random() * (sizeRange[1] - sizeRange[0]) + sizeRange[0];
      star.style.width = size + 'px';
      star.style.height = size + 'px';
      star.style.top = Math.random() * 100 + '%';
      star.style.left = Math.random() * 100 + '%';
      star.style.animationDuration = (Math.random() * (durRange[1] - durRange[0]) + durRange[0]) + 's';
      star.style.animationDelay = (Math.random() * 4) + 's';
      container.appendChild(star);
    }
  }
  makeStars('stars', 90, [1, 2], [2, 5]);
  makeStars('stars2', 35, [2, 3.2], [3, 6]);

  // ===== Timer =====
  const clockEl = document.getElementById('clock');
  const labelEl = document.getElementById('label');
  const subEl = document.getElementById('sub');
  const startBtn = document.getElementById('startBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const resetBtn = document.getElementById('resetBtn');
  const customMins = document.getElementById('customMins');
  const customSet = document.getElementById('customSet');
  const presetBtns = document.querySelectorAll('.preset-btn');

  let totalSeconds = 0;
  let remaining = 0;
  let intervalId = null;
  let currentLabel = '';

  function formatTime(s) {
    const m = Math.floor(s / 60).toString().padStart(2, '0');
    const sec = (s % 60).toString().padStart(2, '0');
    return m + ':' + sec;
  }

  function renderClock() {
    clockEl.textContent = formatTime(remaining);
    clockEl.classList.toggle('done-flash', remaining === 0 && intervalId === null && totalSeconds > 0);
  }

  function setMode(mins, label) {
    clearInterval(intervalId);
    intervalId = null;
    totalSeconds = mins * 60;
    remaining = totalSeconds;
    currentLabel = label;
    labelEl.textContent = label.toUpperCase();
    subEl.textContent = 'ready';
    startBtn.disabled = false;
    pauseBtn.disabled = true;
    resetBtn.disabled = false;
    presetBtns.forEach(b => b.classList.toggle('active', b.dataset.label === label));
    renderClock();
  }

  presetBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      setMode(parseFloat(btn.dataset.mins), btn.dataset.label);
    });
  });

  customSet.addEventListener('click', () => {
    const val = parseFloat(customMins.value);
    if (val > 0) {
      presetBtns.forEach(b => b.classList.remove('active'));
      setMode(val, 'Custom');
    }
  });

  startBtn.addEventListener('click', () => {
    if (intervalId) return;
    if (remaining <= 0) return;
    subEl.textContent = 'running';
    startBtn.disabled = true;
    pauseBtn.disabled = false;
    intervalId = setInterval(() => {
      remaining--;
      renderClock();
      if (remaining <= 0) {
        clearInterval(intervalId);
        intervalId = null;
        subEl.textContent = 'time\'s up';
        pauseBtn.disabled = true;
        startBtn.disabled = true;
        renderClock();
      }
    }, 1000);
  });

  pauseBtn.addEventListener('click', () => {
    clearInterval(intervalId);
    intervalId = null;
    subEl.textContent = 'paused';
    startBtn.disabled = false;
    pauseBtn.disabled = true;
  });

  resetBtn.addEventListener('click', () => {
    clearInterval(intervalId);
    intervalId = null;
    remaining = totalSeconds;
    subEl.textContent = 'ready';
    startBtn.disabled = false;
    pauseBtn.disabled = true;
    renderClock();
  });

  renderClock();
</script>

</body>
</html>
